<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Manager</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:700px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
margin-top:0;
text-align:center;
color:#333;
}

.form{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.add-btn{
background:#28a745;
color:white;
}

.add-btn:hover{
background:#218838;
}

.delete-btn{
background:#dc3545;
color:white;
}

.delete-btn:hover{
background:#c82333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#343a40;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f1f1f1;
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Management</h1>

<div class="form">
<input id="name" placeholder="Student Name">
<input id="age" placeholder="Age">
<input id="course" placeholder="Course">
<button class="add-btn" onclick="addStudent()">Add</button>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Course</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

<div class="footer">
Frontend on Render | Backend on AWS EC2 + Docker
</div>

</div>

<script>

const BASE_URL="http://13.201.30.186";
const PROXY="https://corsproxy.io/?";

function loadStudents(){

fetch(PROXY + BASE_URL + "/students")
.then(res=>res.json())
.then(data=>{

const table=document.getElementById("studentTable");
table.innerHTML="";

data.forEach(s=>{

table.innerHTML+=`
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.age}</td>
<td>${s.course}</td>
<td>
<button class="delete-btn" onclick="deleteStudent(${s.id})">Delete</button>
</td>
</tr>
`;

});

});

}

function addStudent(){

const student={
name:document.getElementById("name").value,
age:document.getElementById("age").value,
course:document.getElementById("course").value
};

fetch(PROXY + BASE_URL + "/students",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(student)
})
.then(()=>{
loadStudents();
document.getElementById("name").value="";
document.getElementById("age").value="";
document.getElementById("course").value="";
});

}

function deleteStudent(id){

fetch(PROXY + BASE_URL + "/students/" + id,{
method:"DELETE"
})
.then(()=>loadStudents());

}

loadStudents();

</script>

</body>
</html>
